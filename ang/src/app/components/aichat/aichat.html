<p-toast></p-toast>
<div class="card flex justify-center">
  <p-dialog
    header="create new conversation."
    [modal]="true"
    [(visible)]="visible"
    [style]="{ width: '26rem' }"
  >
    <div class="flex items-center justify-between gap-[10px] mb-4">
      <label for="username" class="font-semibold w-24 p-2">name</label>
      <input pInputText id="username" #txt class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex justify-end gap-[10px] p-[2px]">
      <p-button label="Cancel" severity="secondary" (click)="visible.set(false)" />
      <p-button label="Save" (click)="Created(txt.value)" />
    </div>
  </p-dialog>
</div>
<p-splitter [style]="{ height: '100%','background-color': '#141723' }" [panelSizes]="[25, 75]">
  <ng-template #panel>
    <p-scroll-panel [style]="{ height: '100%','background-color': '#141723' }">
      <p-menu [style]="{ 'background-color': '#141723' }" class="  h-screen border-none  bg-[#141723]!" [model]="items()"></p-menu>
      @if(filesList().length>0){
        <div class="text-center h-[100px] flex-col items-center justify-center">
               <div class="text-center"> tu upload  {{filesList().length}} fichier pdf </div>
               <p-progressbar  mode="indeterminate" [style]="{ height: '6px' }" />
         </div>
  
      }@else {
        <div class="text-center h-[100px] flex items-center justify-center">si tu upload des fichier tu voir ici </div>
      }
    </p-scroll-panel>
  </ng-template>
  <ng-template #panel style="background-color:rgb(25, 29, 48)!important;">
    <div class=" flex flex-col items-center p-[22px] h-full w-full bg-[#191d30] ">
     
        <p-scroll-panel  [style]="{ width: '100%',height: '100%','background-color': 'transparent' }"  styleClass="custom-scroll" >

          <div class="flex flex-col bg-[#191d30] min-h-full p-[30px] "  >
          @if (listMessages().length > 0) {
              @for (msg of listMessages(); track $index) {
                @if (msg.role == 'HUMAN') {
                  <div class="human">
                    {{ msg.message }}
                  </div>
                } @else {
                  <div class="ai">
                    <div class="bg-[#18181b] mb-2 w-fit ">
                       <img  src="/AI.png" alt="">
                    </div>
                    <div class="">
                     <markdown  [disableSanitizer]="true"  [data]="msg.message "></markdown> 
                    </div>
                  </div>
                }
              }
            } 
            @else {
              <div class="flex justify-center items-center h-64">
                <h1 class="text-[200%] font-bold text-gray-400">Ask Anything...</h1>
              </div>
            }
          </div>
        </p-scroll-panel>
      
     <div class=" input_holder  w-[85%]  bg-[#18181b] " >

       <p-iconfield class="w-full">
         <p-inputicon class="pi pi-search" />
         <input
           type="text"
           pInputText
           placeholder="donner votre opinion ..."
           class="w-full outline-0! border-0! "
           (keyup.enter)="sendMessage()"
           [(ngModel)]="newMessage"
         />
         <p-inputicon class="cursor-pointer pi pi-plus" (click)="file.click()">
           <input type="file" hidden #file multiple (change)="onFileChange($event)" />
         </p-inputicon>
         <p-inputIcon class="cursor-pointer pi pi-send" (click)="sendMessage()"></p-inputIcon>
       </p-iconfield>
     </div>
    </div>
  </ng-template>
</p-splitter>
